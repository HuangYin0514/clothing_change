TASK:
  NAME: "Method_Name"
  NOTES: "KaggleVersion_Notes"
  PROJECT: "CC_ReID"
  TAGS: ["dev", "train"]  
  DEVICE: "cuda"  
  SEED: 1

DATA:
  TRAIN_DATASET: "ltcc"
  TRAIN_ROOT: "/kaggle/input/datasets/huangyin0514/ltcc-dataset/LTCC/rgb/"
  IMAGE_HEIGHT: 384
  IMAGE_WIDTH: 192
  BATCHSIZE: 16
  NUM_INSTANCES: 16
  TEST_BATCH: 128
  NUM_WORKERS: 4
  
MODEL:
  MODULE: "Lucky"   # Lucky / Baseline / B_IP
  BACKBONE_TYPE: "resnet50" # resnet50 / resnet50_ibn_a

OPTIMIZER:
  NAME: "Adam"
  TOTAL_TRAIN_EPOCH: 120
  LEARNING_RATE: 0.00035

SCHEDULER:
  NAME: "WarmupMultiStepLR"

TEST:
  EVAL_EPOCH: 5
  SAVE_START_EPOCH: 80
  RESUME_TEST_EPOCH: 119  
  TEST_MODE: "inter-camera"  
  RE_RANK: False

SAVE:
  OUTPUT_PATH: "results"

